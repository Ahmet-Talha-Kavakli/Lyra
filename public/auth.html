<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyra — AI Terapist</title>
  <style>
    :root {
      --lyra-dark: #0a0806;
      --lyra-gold: #c8a96e;
      --lyra-gold-light: rgba(200,169,110,0.1);
      --lyra-text: rgba(240,230,210,0.85);
      --lyra-text-muted: rgba(200,180,140,0.55);
      --lyra-border: rgba(200,169,110,0.15);
      --lyra-purple: #6C3FF5;
      --lyra-black: #2D2D2D;
      --lyra-orange: #FF9B6B;
      --lyra-yellow: #E8D754;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--lyra-dark);
      color: var(--lyra-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* LEFT SIDE - Characters */
    .auth-characters-section {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      background: linear-gradient(135deg, rgba(108,63,245,0.1) 0%, rgba(200,169,110,0.05) 100%);
      border-right: 1px solid var(--lyra-border);
      position: relative;
      z-index: 1;
    }

    .auth-characters-header {
      font-size: 14px;
      letter-spacing: 0.1em;
      color: var(--lyra-gold);
      text-transform: uppercase;
      font-weight: 600;
    }

    .auth-characters-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      position: relative;
    }

    .characters-stage {
      position: relative;
      width: 550px;
      height: 400px;
    }

    /* Character Styles */
    .character {
      position: absolute;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      border-radius: 10px 10px 0 0;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .character-purple {
      left: 70px;
      width: 180px;
      height: 400px;
      background: var(--lyra-purple);
      z-index: 1;
    }

    .character-black {
      left: 240px;
      width: 120px;
      height: 310px;
      background: var(--lyra-black);
      z-index: 2;
      border-radius: 8px 8px 0 0;
    }

    .character-orange {
      left: 0;
      width: 240px;
      height: 200px;
      background: var(--lyra-orange);
      border-radius: 120px 120px 0 0;
      z-index: 3;
    }

    .character-yellow {
      left: 310px;
      width: 140px;
      height: 230px;
      background: var(--lyra-yellow);
      border-radius: 70px 70px 0 0;
      z-index: 4;
    }

    .eyes {
      position: absolute;
      display: flex;
      gap: 8px;
      transition: all 0.2s ease-out;
    }

    .eye {
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pupil {
      width: 8px;
      height: 8px;
      background: var(--lyra-black);
      border-radius: 50%;
      position: absolute;
      transition: transform 0.1s ease-out;
    }

    .mouth {
      position: absolute;
      width: 20px;
      height: 4px;
      background: var(--lyra-black);
      border-radius: 2px;
      transition: all 0.2s ease-out;
    }

    /* RIGHT SIDE - Form */
    .auth-form-section {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      z-index: 1;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: rgba(16,11,7,0.95);
      border: 1px solid var(--lyra-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-logo {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--lyra-gold);
      margin-bottom: 8px;
    }

    .auth-tagline {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--lyra-text-muted);
      text-transform: uppercase;
      font-weight: 500;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--lyra-border);
      margin-bottom: 32px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px 16px;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: var(--lyra-text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-weight: 500;
    }

    .auth-tab:hover {
      color: var(--lyra-text);
    }

    .auth-tab.active {
      color: var(--lyra-gold);
      border-bottom-color: var(--lyra-gold);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .hidden {
      display: none !important;
    }

    .auth-form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .auth-form-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--lyra-text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .auth-form-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--lyra-border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--lyra-text);
      outline: none;
      transition: all 0.2s ease;
      width: 100%;
      font-family: inherit;
    }

    .auth-form-input:focus {
      border-color: var(--lyra-gold);
      background: rgba(200,169,110,0.05);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
    }

    .auth-form-input::placeholder {
      color: rgba(200,180,140,0.3);
    }

    .auth-form-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--lyra-text-muted);
      line-height: 1.5;
      cursor: pointer;
    }

    .auth-form-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      accent-color: var(--lyra-gold);
      cursor: pointer;
    }

    .auth-form-checkbox a {
      color: var(--lyra-gold);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .auth-form-checkbox a:hover {
      opacity: 0.8;
    }

    .auth-form-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .auth-form-forgot {
      font-size: 12px;
      color: var(--lyra-text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: color 0.2s;
    }

    .auth-form-forgot:hover {
      color: var(--lyra-gold);
    }

    .auth-btn {
      background: linear-gradient(135deg, rgba(200,169,110,0.95), rgba(180,145,85,0.95));
      color: var(--lyra-dark);
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      margin-top: 8px;
      text-transform: uppercase;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(200,169,110,0.25);
    }

    .auth-btn:active {
      transform: translateY(0);
    }

    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: rgba(200,169,110,0.2);
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: currentColor;
    }

    .auth-divider span {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .auth-social {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--lyra-border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--lyra-text);
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      font-weight: 500;
    }

    .auth-social-btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(200,169,110,0.3);
      color: var(--lyra-gold);
    }

    .auth-message {
      font-size: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .auth-message.error {
      background: rgba(200,60,60,0.1);
      border: 1px solid rgba(200,60,60,0.2);
      color: rgba(255,120,120,0.9);
    }

    .auth-message.success {
      background: rgba(60,160,80,0.1);
      border: 1px solid rgba(60,160,80,0.2);
      color: rgba(100,200,120,0.9);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1024px) {
      body {
        grid-template-columns: 1fr;
      }

      .auth-characters-section {
        display: none;
      }

      .auth-card {
        padding: 32px 24px;
      }

      .auth-logo {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- LEFT: Characters -->
  <div class="auth-characters-section">
    <div class="auth-characters-header">LYRA AI</div>

    <div class="auth-characters-container">
      <div class="characters-stage">
        <!-- Purple Character -->
        <div class="character character-purple" id="charPurple">
          <div class="eyes" id="eyesPurple" style="left: 45px; top: 40px;">

          </div>
        </div>

        <!-- Black Character -->
        <div class="character character-black" id="charBlack">
          <div class="eyes" id="eyesBlack" style="left: 26px; top: 32px;">

          </div>
        </div>

        <!-- Orange Character -->
        <div class="character character-orange" id="charOrange">
          <div class="eyes" id="eyesOrange" style="left: 82px; top: 90px;">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
          </div>
        </div>

    </div>

    <div class="auth-characters-header" style="text-align: center; font-size: 12px;">
      Seninle burada olmaktan mutluyuz
    </div>
  </div>

  <!-- RIGHT: Auth Form -->
  <div class="auth-form-section">
    <div class="auth-container">
      <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
          <div class="auth-logo">LYRA</div>
          <div class="auth-tagline">AI Terapist</div>
        </div>

        <!-- Message Area -->
        <div class="auth-message" id="msg"></div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Giriş Yap</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Kayıt Ol</button>
        </div>

        <!-- Login Form -->
        <div id="form-login" class="auth-form">
          <div class="auth-form-field">
            <label class="auth-form-label">E-posta</label>
            <input type="email" id="login-email" class="auth-form-input" placeholder="ornek@email.com" autocomplete="email">
          </div>
          <div class="auth-form-field">
            <label class="auth-form-label">Şifre</label>
            <input type="password" id="login-password" class="auth-form-input" placeholder="••••••••" autocomplete="current-password">
          </div>
          <div class="auth-form-actions">
            <button class="auth-form-forgot" onclick="showForgotPassword()">Şifremi Unuttum?</button>
          </div>
          <button class="auth-btn" id="btn-login" onclick="handleLogin()">Giriş Yap</button>
        </div>

        <!-- Register Form -->
        <div id="form-register" class="auth-form hidden">
          <div class="auth-form-field">
            <label class="auth-form-label">E-posta</label>
            <input type="email" id="reg-email" class="auth-form-input" placeholder="ornek@email.com" autocomplete="email">
          </div>
          <div class="auth-form-field">
            <label class="auth-form-label">Şifre</label>
            <input type="password" id="reg-password" class="auth-form-input" placeholder="En az 8 karakter" autocomplete="new-password">
          </div>
          <label class="auth-form-checkbox">
            <input type="checkbox" id="consent-check">
            <span>
              <a href="/privacy.html" target="_blank">Gizlilik Politikası</a>'nı ve
              <a href="/terms.html" target="_blank">Kullanım Şartları</a>'nı kabul ediyorum.
              (18 yaş ve üzerindeyim)
            </span>
          </label>
          <button class="auth-btn" id="btn-register" onclick="handleRegister()">Kayıt Ol</button>
        </div>

        <!-- Forgot Password Form -->
        <div id="form-forgot" class="auth-form hidden">
          <div class="auth-form-field">
            <label class="auth-form-label">E-posta Adresiniz</label>
            <input type="email" id="forgot-email" class="auth-form-input" placeholder="ornek@email.com">
          </div>
          <button class="auth-btn" onclick="handleForgotPassword()">Sıfırlama Linki Gönder</button>
          <button class="auth-form-forgot" onclick="switchTab('login')" style="margin-top: 12px;">← Giriş Sayfasına Dön</button>
        </div>

        <!-- Divider -->
        <div class="auth-divider">
          <span>Veya</span>
        </div>

        <!-- Social Login -->
        <div class="auth-social">
          <button class="auth-social-btn" onclick="handleSocial('google')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">

              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="auth-social-btn" onclick="handleSocial('facebook')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook
          </button>
          <button class="auth-social-btn" onclick="handleSocial('apple')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            Apple
          </button>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    // ═══════════════════════════════════════════════════════════════════════════
    // CHARACTER ANIMATION LOGIC
    // ═══════════════════════════════════════════════════════════════════════════

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let isTyping = false;
    let passwordVisible = false;

    // Track mouse position
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      updateCharacterEyes();
    });

    function updateCharacterEyes() {
      const characters = [
        { char: document.getElementById('charPurple'), eyes: document.getElementById('eyesPurple'), offset: { x: 70, y: 0 } },
        { char: document.getElementById('charBlack'), eyes: document.getElementById('eyesBlack'), offset: { x: 240, y: 0 } },
        { char: document.getElementById('charOrange'), eyes: document.getElementById('eyesOrange'), offset: { x: 0, y: 50 } },
        { char: document.getElementById('charYellow'), eyes: document.getElementById('eyesYellow'), offset: { x: 310, y: 0 } },
      ];

      characters.forEach(({ char, eyes, offset }) => {
        const rect = char.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 3;

        const deltaX = mouseX - centerX;
        const deltaY = mouseY - centerY;
        const distance = Math.sqrt(deltaX ** 2 + deltaY ** 2);
        const angle = Math.atan2(deltaY, deltaX);

        const maxDistance = 5;
        const limitedDistance = Math.min(distance / 50, maxDistance);

        const pupilX = Math.cos(angle) * limitedDistance;
        const pupilY = Math.sin(angle) * limitedDistance;

        const pupils = eyes.querySelectorAll('.pupil');
        pupils.forEach(pupil => {
          pupil.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
        });
      });
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // AUTH LOGIC (Supabase)
    // ═══════════════════════════════════════════════════════════════════════════

    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const supabase = createClient(
      'https://gxbjqujmcklysbocsoad.supabase.co',
      'sb_publishable_64FHvp6yfwpcx8chsIO8JQ_aV6MLHNj'
    );

    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/';

    window.switchTab = (tab) => {
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('form-forgot').classList.toggle('hidden', tab !== 'forgot');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideMsg();
    };

    window.showForgotPassword = () => {
      document.getElementById('form-login').classList.add('hidden');
      document.getElementById('form-forgot').classList.remove('hidden');
      document.getElementById('tab-login').classList.remove('active');
    };

    function showMsg(text, type = 'error') {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `auth-message ${type}`;
      el.style.display = 'block';
    }

    function hideMsg() {
      document.getElementById('msg').style.display = 'none';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Lütfen bekleyin...' : btn.dataset.label || btn.textContent;
    }

    window.handleLogin = async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showMsg('E-posta ve şifre zorunlu.');
      setLoading('btn-login', true);
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      setLoading('btn-login', false);
      if (error) return showMsg(error.message === 'Invalid login credentials' ? 'E-posta veya şifre hatalı.' : 'Giriş başarısız.');
      window.location.href = '/';
    };

    window.handleRegister = async () => {
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const consent = document.getElementById('consent-check').checked;
      if (!email || !password) return showMsg('E-posta ve şifre zorunlu.');
      if (password.length < 8) return showMsg('Şifre en az 8 karakter olmalı.');
      if (!consent) return showMsg('Devam etmek için şartları kabul etmeniz gerekiyor.');
      setLoading('btn-register', true);
      const { data, error } = await supabase.auth.signUp({ email, password });
      setLoading('btn-register', false);
      if (error) return showMsg('Kayıt başarısız: ' + (error.message || ''));
      if (data.user && !data.session) {
        showMsg('E-posta adresinize doğrulama linki gönderildi.', 'success');
      } else {
          await supabase.from('user_consents').upsert({
          user_id: data.user.id,
          consent_given: true,
          consent_date: new Date().toISOString()
        });
        window.location.href = '/';
      }
    };

    window.handleForgotPassword = async () => {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) return showMsg('E-posta adresi zorunlu.');
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/auth.html'
      });
      if (error) return showMsg('İşlem başarısız.');
      showMsg('Şifra sıfırlama linki gönderildi.', 'success');
    };

    window.handleSocial = async (provider) => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider,
        options: { redirectTo: window.location.origin + '/' }
      });
      if (error) showMsg('Sosyal giriş başarısız.');
    };

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const loginVisible = !document.getElementById('form-login').classList.contains('hidden');
      const registerVisible = !document.getElementById('form-register').classList.contains('hidden');
      if (loginVisible) window.handleLogin();
      else if (registerVisible) window.handleRegister();
    });

    // Track typing
    document.getElementById('login-email').addEventListener('focus', () => { isTyping = true; });
    document.getElementById('login-email').addEventListener('blur', () => { isTyping = false; });
    document.getElementById('login-password').addEventListener('focus', () => { isTyping = true; });
    document.getElementById('login-password').addEventListener('blur', () => { isTyping = false; });
    document.getElementById('reg-email').addEventListener('focus', () => { isTyping = true; });
    document.getElementById('reg-email').addEventListener('blur', () => { isTyping = false; });
    document.getElementById('reg-password').addEventListener('focus', () => { isTyping = true; });
    document.getElementById('reg-password').addEventListener('blur', () => { isTyping = false; });
  </script>
</body>
</html>
