<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/20.0.0/tween.umd.js"></script>
    <style>
        :root {
            --primary: #c8a96e;
            --accent: #e8c99a;
            --bg: #1a1510;
            --panel-bg: rgba(20, 15, 10, 0.65);
            --border: rgba(200, 169, 110, 0.25);
            --text-color: rgba(240, 230, 210, 0.92);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* ── TERAPİ LAYOUT ── */
        .therapy-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #080510;
            overflow: hidden;
        }

        .panels-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex: 1;
            min-height: 0;
            padding: 16px 16px 8px;
        }

        .panel-lyra {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0618;
            border: 2px solid rgba(200, 169, 110, 0.12);
            transition: border-color 0.3s ease;
        }

        .panel-user {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #0d0a07;
            border: 2px solid rgba(200, 169, 110, 0.12);
            transition: border-color 0.3s ease;
        }

        .panel-label {
            position: absolute;
            bottom: 12px;
            left: 16px;
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 100px;
        }

        #user-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-off-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
        }
        .camera-off-msg span { font-size: 36px; display: block; }
        .camera-off-msg p { font-size: 12px; margin: 8px 0 0; letter-spacing: 0.1em; text-transform: uppercase; }
        .camera-off-msg.hidden { display: none; }

        .bottom-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 4px 16px 14px;
            flex-shrink: 0;
        }

        .top-bar-inline {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        .brand-small span {
            font-weight: 200;
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--primary);
            text-transform: uppercase;
        }

        #transcript-small {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            font-style: italic;
            max-width: 600px;
            text-align: center;
            min-height: 18px;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            pointer-events: all;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        @media (max-width: 767px) {
            .panels-row {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                padding: 10px 10px 6px;
                gap: 8px;
            }
        }

        /* ── LOADER ── */
        #loader-overlay {
            position: fixed;
            inset: 0;
            background: #100d08;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease;
        }

        .loader-ring {
            width: 64px; height: 64px;
            border: 1.5px solid rgba(200, 169, 110, 0.15);
            border-top: 1.5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin-bottom: 24px;
        }

        #loader-status {
            letter-spacing: 6px;
            font-size: 11px;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 200;
            opacity: 0.8;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MAIN UI ── */
        .ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px 40px 40px;
            transition: opacity 0.8s ease;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            animation: fadeInDown 0.9s ease-out both;
        }

        .brand h1 {
            font-weight: 200;
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
            color: var(--accent);
            font-size: 1.8rem;
            opacity: 0.9;
        }

        .status-badge {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            padding: 8px 22px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--primary);
        }

        /* Bottom interaction area */
        .interaction-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeInUp 1s ease-out both;
            width: 100%;
        }

        #transcript {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            padding: 22px 44px;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 780px;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.65;
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }

        .controls {
            display: flex;
            gap: 16px;
            pointer-events: auto;
        }

        .main-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 18px 60px;
            border-radius: 100px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.75rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(12px);
            pointer-events: auto;
        }

        .main-btn:hover {
            background: rgba(200, 169, 110, 0.15);
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .main-btn.active {
            border-color: #c87060;
            color: #e8a090;
        }

        .main-btn.active:hover {
            background: rgba(200, 112, 96, 0.15);
        }

        /* ── GLOW ÇERÇEVE ── */
        @keyframes glow-lyra {
            0%, 100% {
                border-color: rgba(140, 100, 255, 0.7);
                box-shadow:
                    0 0 0 0 transparent,
                    0 0 18px 3px rgba(100, 70, 220, 0.35),
                    inset 0 0 30px rgba(120, 80, 255, 0.08);
            }
            50% {
                border-color: rgba(180, 140, 255, 1);
                box-shadow:
                    0 0 0 4px rgba(150, 110, 255, 0.25),
                    0 0 40px 12px rgba(120, 90, 240, 0.55),
                    inset 0 0 40px rgba(140, 100, 255, 0.15);
            }
        }

        @keyframes glow-user {
            0%, 100% {
                border-color: rgba(80, 200, 120, 0.6);
                box-shadow:
                    0 0 0 0 transparent,
                    0 0 18px 3px rgba(60, 180, 100, 0.3),
                    inset 0 0 30px rgba(80, 200, 120, 0.06);
            }
            50% {
                border-color: rgba(120, 240, 160, 1);
                box-shadow:
                    0 0 0 4px rgba(80, 220, 130, 0.2),
                    0 0 40px 12px rgba(60, 200, 110, 0.45),
                    inset 0 0 40px rgba(80, 220, 130, 0.12);
            }
        }

        .panel-lyra.speaking {
            animation: glow-lyra 1.4s ease-in-out infinite;
        }
        .panel-user.speaking {
            animation: glow-user 1.4s ease-in-out infinite;
        }

        .camera-btn {
            width: 48px; height: 48px;
            border-radius: 14px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .camera-btn.active {
            background: rgba(200, 169, 110, 0.2);
            border-color: var(--primary);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(200,80,70,0.5); }
            50%       { box-shadow: 0 0 0 10px rgba(200,80,70,0); }
        }
        @keyframes mic-wave {
            0%, 100% { transform: scaleY(0.4); }
            50%       { transform: scaleY(1.0); }
        }

        .status-badge.listening {
            animation: pulse-red 1.2s ease-in-out infinite;
            border-color: #c87060;
            color: #e8a090;
        }

        #mic-indicator {
            display: none;
            align-items: center;
            gap: 3px;
            height: 24px;
        }
        #mic-indicator.active { display: flex; }
        #mic-indicator span {
            display: inline-block;
            width: 3px;
            background: var(--primary);
            border-radius: 2px;
            animation: mic-wave 0.8s ease-in-out infinite;
        }
        #mic-indicator span:nth-child(2) { animation-delay: 0.1s; }
        #mic-indicator span:nth-child(3) { animation-delay: 0.2s; }
        #mic-indicator span:nth-child(4) { animation-delay: 0.3s; }
        #mic-indicator span:nth-child(5) { animation-delay: 0.15s; }

        #loader-bar-wrap {
            width: 220px;
            height: 1px;
            background: rgba(200,169,110,0.15);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        #loader-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        #transcript {
            transition: opacity 0.3s ease;
        }

        #error-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(180, 60, 50, 0.9);
            border: 1px solid rgba(220,100,90,0.4);
            backdrop-filter: blur(12px);
            color: #ffd4cc;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        #error-toast.show { opacity: 1; }

        /* ── LOGIN OVERLAY ── */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: #100d08;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }
        #login-overlay.hidden { opacity: 0; pointer-events: none; }

        .login-box {
            width: 340px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(20px);
        }
        .login-box h1 {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 0.4em;
            color: var(--primary);
            margin: 0 0 4px;
        }
        .login-box p {
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            color: rgba(200,169,110,0.5);
            margin: 0 0 8px;
            text-transform: uppercase;
        }
        .login-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-input:focus { border-color: var(--primary); }
        .login-input::placeholder { color: rgba(200,169,110,0.3); }

        .remember-row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: rgba(200,169,110,0.6);
            cursor: pointer;
        }
        .remember-row input[type="checkbox"] {
            accent-color: var(--primary);
            width: 14px; height: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: #1a1510;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 4px;
        }
        .login-btn:hover { opacity: 0.85; }
        .login-btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--primary);
            font-weight: 400;
            margin-top: 0;
        }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #login-error {
            font-size: 0.78rem;
            color: #e87060;
            text-align: center;
            min-height: 18px;
            letter-spacing: 0.05em;
        }
        .login-divider {
            width: 100%;
            border: none;
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>
    <!-- ── GİRİŞ EKRANI ── -->
    <div id="login-overlay">
        <div class="login-box">
            <h1>LYRA</h1>
            <p>Kozmik Rehberinize Bağlanın</p>
            <input class="login-input" type="email" id="login-email" placeholder="E-posta" autocomplete="email">
            <input class="login-input" type="password" id="login-password" placeholder="Şifre" autocomplete="current-password">
            <label class="remember-row">
                <input type="checkbox" id="remember-me" checked>
                Beni Hatırla
            </label>
            <div id="login-error"></div>
            <button class="login-btn" id="login-btn">GİRİŞ YAP</button>
            <hr class="login-divider">
            <button class="login-btn secondary" id="register-btn">KAYIT OL</button>
        </div>
    </div>

    <div id="loader-overlay" style="display:none">
        <div class="loader-ring"></div>
        <div id="loader-status">BAŞLATILIYOR...</div>
        <div id="loader-bar-wrap">
            <div id="loader-bar"></div>
        </div>
    </div>

    <div id="error-toast"></div>
    <canvas id="hidden-canvas" style="display:none"></canvas>

    <div class="therapy-layout" id="therapyLayout">
        <div class="panels-row">
            <!-- Sol panel: Lyra 3D avatar -->
            <div class="panel-lyra" id="panel-lyra">
                <div id="canvas-container"></div>
                <div class="panel-label">Lyra</div>
            </div>

            <!-- Sağ panel: Kullanıcı kamerası -->
            <div class="panel-user" id="panel-user">
                <video id="user-video" autoplay muted playsinline></video>
                <div class="panel-label">Sen</div>
                <div class="camera-off-msg" id="camera-off-msg">
                    <span>📷</span>
                    <p>Kamera kapalı</p>
                </div>
            </div>
        </div>

        <!-- Alt kontroller -->
        <div class="bottom-controls">
            <div class="top-bar-inline">
                <div class="brand-small"><span>LYRA</span></div>
                <div class="status-badge" id="status">SİSTEM HAZIR</div>
            </div>
            <div id="transcript-small">"Merhaba, bugün nasılsınız?"</div>
            <div class="controls-row">
                <div id="mic-indicator">
                    <span style="height:8px"></span>
                    <span style="height:14px"></span>
                    <span style="height:20px"></span>
                    <span style="height:14px"></span>
                    <span style="height:8px"></span>
                </div>
                <button class="main-btn" id="talkBtn">GÖRÜŞMEYİ BAŞLAT</button>
                <button class="camera-btn" id="camera-toggle" title="Kamera Analizi">📷</button>
            </div>
        </div>
    </div>

    <!-- Eski ui-overlay kaldırıldı, transcript ve controls bottom-controls'a taşındı -->

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import Vapi from "https://esm.sh/@vapi-ai/web";

        // ── SUPABASE AUTH ──
        let supabaseClient = null;
        let persistentUserId = null;
        let supabaseToken = null;

        async function initAuth() {
            // Config'i backend'den al
            const cfg = await fetch('/config').then(r => r.json());
            supabaseClient = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

            // Mevcut oturumu kontrol et
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                persistentUserId = session.user.id;
                supabaseToken = session.access_token;
                hideLoginOverlay();
            } else {
                showLoginOverlay();
            }

            setupLoginHandlers();
        }

        function showLoginOverlay() {
            document.getElementById('login-overlay').style.display = 'flex';
        }

        function hideLoginOverlay() {
            const el = document.getElementById('login-overlay');
            el.classList.add('hidden');
            // Loader'ı göster, sonra login overlay'i kapat
            const loader = document.getElementById('loader-overlay');
            loader.style.display = 'flex';
            setTimeout(() => { el.style.display = 'none'; }, 700);
        }

        function setupLoginHandlers() {
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');
            const errorEl = document.getElementById('login-error');
            const rememberMe = document.getElementById('remember-me');

            async function doLogin() {
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;
                errorEl.textContent = '';
                loginBtn.disabled = true;
                loginBtn.textContent = 'GİRİŞ YAPILIYOR...';

                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    errorEl.textContent = 'Hatalı e-posta veya şifre.';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'GİRİŞ YAP';
                    return;
                }

                persistentUserId = data.user.id;
                supabaseToken = data.session.access_token;

                if (!rememberMe.checked) {
                    // Remember me kapalıysa session'ı temizle çıkışta
                    window._noRemember = true;
                }

                hideLoginOverlay();
            }

            loginBtn.addEventListener('click', doLogin);
            document.getElementById('login-password').addEventListener('keydown', e => {
                if (e.key === 'Enter') doLogin();
            });

            registerBtn.addEventListener('click', async () => {
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;
                errorEl.textContent = '';
                registerBtn.disabled = true;
                registerBtn.textContent = 'KAYIT YAPILIYOR...';

                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    errorEl.textContent = error.message;
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'KAYIT OL';
                    return;
                }

                if (data.user && data.session) {
                    persistentUserId = data.user.id;
                    supabaseToken = data.session.access_token;
                    hideLoginOverlay();
                } else {
                    errorEl.textContent = 'E-posta doğrulama gerekiyor, lütfen e-postanı kontrol et.';
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'KAYIT OL';
                }
            });
        }

        // Auth bittikten sonra sahneyi başlat
        initAuth().then(() => {
            // loader-overlay başlangıçta gizli — auth geçtikten sonra initScene çağrılacak
            // hideLoginOverlay içinde initScene tetiklenir (MutationObserver ile)
            const loginOverlay = document.getElementById('login-overlay');
            const observer = new MutationObserver(() => {
                if (loginOverlay.style.display === 'none' && persistentUserId) {
                    observer.disconnect();
                    initScene();
                }
            });
            observer.observe(loginOverlay, { attributes: true, attributeFilter: ['style'] });

            // Eğer zaten giriş yapılmışsa (session var), overlay zaten gizlendi
            if (loginOverlay.style.display === 'none' && persistentUserId) {
                initScene();
            }
        });

        // ── VAPI ──
        const VAPI_PUBLIC_KEY    = "2bd1acf3-d1eb-423e-9e31-23418fe111d4";
        const VAPI_ASSISTANT_ID  = "25ef33ad-0459-4057-841f-ea222bdfa126";
        const vapiInstance = new Vapi(VAPI_PUBLIC_KEY);

        // ── UI ──
        const talkBtn      = document.getElementById('talkBtn');
        const statusEl     = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript-small');
        const loaderOverlay = document.getElementById('loader-overlay');
        const loaderStatus  = document.getElementById('loader-status');

        // ── PROGRESS & ERRORS ──
        const loaderBar = document.getElementById('loader-bar');
        function setProgress(pct, label) {
            if (loaderBar) loaderBar.style.width = pct + '%';
            if (loaderStatus && label) loaderStatus.textContent = label;
        }

        function showError(msg) {
            const t = document.getElementById('error-toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        let isCallActive = false;
        let targetVolume = 0, currentVolume = 0;
        let fullConversation = "";

        // ── CAMERA ──
        let camStream = null, cameraActive = false;
        let currentEmotionState = 'sakin';
        const cameraToggleBtn = document.getElementById('camera-toggle');
        const userVideo        = document.getElementById('user-video');
        const cameraOffMsg     = document.getElementById('camera-off-msg');

        // Adaptif interval
        let adaptifInterval = 4000;
        let sonDuygu = null;
        let ardiArdina = 0;
        let emotionTimer = null;

        // Sessizlik & transcript streaming
        let silenceStartTime = null;
        let silenceDuration = 0;
        let lastUserMessage = '';
        let transcriptStreamInterval = null;

        // Ses zekası
        let sesGecmisi = [];           // Son 20 volume değeri
        let sesYogunlukOrt = 0;
        let sesTitreme = false;
        let konusmaBaslangic = null;
        let konusmaKelimeSayisi = 0;
        let konusmaTempo = 0;          // kelime/saniye
        let tempoGecmisi = [];         // Son 5 tempo değeri

        function getBaseInterval(duygu) {
            if (['korkmuş', 'sinirli'].includes(duygu))               return 1500;
            if (['endişeli', 'üzgün', 'iğnelenmiş'].includes(duygu)) return 2000;
            if (['yorgun', 'şaşırmış'].includes(duygu))              return 2500;
            if (['sakin', 'mutlu'].includes(duygu))                   return 3000;
            return 2000;
        }

        function scheduleNextAnalysis() {
            clearTimeout(emotionTimer);
            emotionTimer = setTimeout(analyzeEmotion, adaptifInterval);
        }

        async function startCamera() {
            try {
                camStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
                    audio: false
                });
                userVideo.srcObject = camStream;
                if (cameraOffMsg) cameraOffMsg.classList.add('hidden');
                cameraActive = true;
                cameraToggleBtn.classList.add('active');
                cameraToggleBtn.textContent = '🟢';
                scheduleNextAnalysis();
            } catch (err) {
                console.error('[KAMERA] Erişim reddedildi:', err);
                // Kamera panelini gizle, Lyra paneli tam genişliğe
                const panelUser = document.getElementById('panel-user');
                if (panelUser) panelUser.style.display = 'none';
                const layout = document.querySelector('.therapy-layout');
                if (layout) layout.style.gridTemplateColumns = '1fr';
            }
        }

        function stopCamera() {
            if (camStream) camStream.getTracks().forEach(t => t.stop());
            camStream = null;
            cameraActive = false;
            clearTimeout(emotionTimer);
            emotionTimer = null;
            adaptifInterval = 4000;
            sonDuygu = null;
            ardiArdina = 0;
            if (userVideo) userVideo.srcObject = null;
            if (cameraOffMsg) cameraOffMsg.classList.remove('hidden');
            cameraToggleBtn.classList.remove('active');
            cameraToggleBtn.textContent = '📷';
        }

        async function analyzeEmotion() {
            if (!cameraActive || !camStream) {
                scheduleNextAnalysis();
                return;
            }
            try {
                // Video akışından frame çek
                if (!userVideo || userVideo.readyState < 2) {
                    scheduleNextAnalysis();
                    return;
                }
                const hiddenCanvas = document.getElementById('hidden-canvas');
                const ctx = hiddenCanvas.getContext('2d');
                hiddenCanvas.width = 640;
                hiddenCanvas.height = 480;
                // Düşük ışık telafisi — brightness ve contrast artır
                ctx.filter = 'brightness(1.5) contrast(1.25) saturate(1.1)';
                ctx.drawImage(userVideo, 0, 0, 640, 480);
                ctx.filter = 'none';
                const imageBase64 = hiddenCanvas.toDataURL('image/jpeg', 0.92).split(',')[1];

                const resp = await fetch('/analyze-emotion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64, userId: persistentUserId, sessionId: null })
                });
                const result = await resp.json();

                if (!result.yuz_var) {
                    console.log('[DUYGU] Yüz bulunamadı, atlanıyor...');
                    scheduleNextAnalysis();
                    return;
                }

                currentEmotionState = result.duygu;

                // Adaptif interval güncelle — max 4sn
                const base = getBaseInterval(result.duygu);
                if (result.duygu === sonDuygu) {
                    ardiArdina++;
                    // Aynı duygu tekrarlıyorsa yavaşla ama max 4sn
                    if (ardiArdina >= 4) adaptifInterval = Math.min(base * 1.5, 4000);
                    else adaptifInterval = base;
                } else {
                    ardiArdina = 0;
                    adaptifInterval = base;
                }
                sonDuygu = result.duygu;

                // Sadece konsolda göster — UI'da hiçbir şey gösterme
                console.log(`[DUYGU] ${result.duygu} | yogunluk:${result.yogunluk} | güven:${result.guven} | interval:${adaptifInterval}ms`);
            } catch (err) {
                console.warn('[DUYGU] Hata:', err.message);
            }
            scheduleNextAnalysis();
        }

        cameraToggleBtn.addEventListener('click', () => { cameraActive ? stopCamera() : startCamera(); });

        // ── THREE.JS ──
        let scene, camera, renderer, composer, clock;
        let avatar, mixer, currentAction;
        let animationsMap = {};
        let cameraTarget = new THREE.Vector3(0, 0.5, 0);
        let blinkTime = 0, emotionState = 'neutral';
        const container = document.getElementById('canvas-container');

        // Lyra karakter tanımı
        const character = {
            name: "Lyra",
            model: "avatar.glb",
            animMap: {
                'Yes':'Agreeing', 'No':'Disagreeing', 'Wave':'Wave',
                'Jump':'Joyful Jump', 'Dance':'Wave Hip Hop Dance',
                'Surprise':'Surprised', 'Looking':'Looking Around', 'Talk':'Talk',
                'Sad':'Sad Idle',
                'Angry':'Angry Gesture'
            },
            scaleMult: 1.0
        };

        // Extra animasyon dosyaları
        const extraAnims = [
            { file:'Agreeing.glb',           name:'Agreeing' },
            { file:'Jump.glb',               name:'Joyful Jump' },
            { file:'Waving.glb',             name:'Wave' },
            { file:'Talking.glb',            name:'Talk' },
            { file:'Shaking Head No.glb',    name:'Disagreeing' },
            { file:'Surprised.glb',          name:'Surprised' },
            { file:'Looking Around.glb',     name:'Looking Around' },
            { file:'Idle.glb',               name:'Idle' },
            { file:'Sad Idle.glb',           name:'Sad Idle' },
            { file:'Wave Hip Hop Dance.glb', name:'Wave Hip Hop Dance' },
            { file:'Angry Gesture.glb',      name:'Angry Gesture' },
        ];

        function initScene() {
            scene = new THREE.Scene();

            const panelLyra = document.getElementById('panel-lyra');
            const panelW = panelLyra ? panelLyra.clientWidth  : window.innerWidth / 2;
            const panelH = panelLyra ? panelLyra.clientHeight : window.innerHeight;

            camera = new THREE.PerspectiveCamera(50, panelW / panelH, 0.1, 1000);
            // Başlangıç pozisyonu — room yüklenince güncellenecek
            camera.position.set(0, 1.2, 5);

            renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false, powerPreference:"high-performance" });
            renderer.setSize(panelW, panelH);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Işıklandırma — sıcak terapi odası
            scene.add(new THREE.AmbientLight(0xfff0d8, 0.7));
            const hemi = new THREE.HemisphereLight(0xffecd2, 0x3d2b1f, 0.8);
            scene.add(hemi);
            const sun = new THREE.DirectionalLight(0xffd4a0, 1.0);
            sun.position.set(4, 8, 6); sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024);
            scene.add(sun);
            const fill = new THREE.DirectionalLight(0xffecd2, 0.4);
            fill.position.set(-4, 3, 2);
            scene.add(fill);
            const warmPoint = new THREE.PointLight(0xff8844, 1.2, 18);
            warmPoint.position.set(0, 4, 0);
            scene.add(warmPoint);
            // Şömine ateşi
            const fireLight = new THREE.PointLight(0xff5500, 1.8, 12);
            fireLight.position.set(0, 0.5, -10);
            scene.add(fireLight);
            window.fireLight = fireLight;

            // Avatar spotlight — konuşunca parlasın
            const avatarSpot = new THREE.SpotLight(0xfff5e0, 1.2, 8, Math.PI / 5, 0.4);
            avatarSpot.position.set(0, 4, 2);
            avatarSpot.castShadow = false;
            scene.add(avatarSpot);
            scene.add(avatarSpot.target);
            window.avatarSpot = avatarSpot;

            setupPostProcessing();
            animate();

            setProgress(10, "ODA YÜKLENİYOR...");
            loadRoom().then(() => {
                setProgress(40, "AVATAR YÜKLENİYOR...");
                return loadAvatar();
            }).then(() => {
                setProgress(100, "HAZIR");
                playAnimation('Idle', true);
                hideLoader();
            });
        }

        function loadRoom() {
            return new Promise((resolve) => {
                const loader = new GLTFLoader();
                loader.load('/room_model/scene.gltf', (gltf) => {
                    const room = gltf.scene;
                    room.traverse(n => { if(n.isMesh) { n.receiveShadow = true; n.castShadow = true; } });
                    scene.add(room);

                    const box    = new THREE.Box3().setFromObject(room);
                    const size   = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    window.roomBox    = box;
                    window.roomCenter = center;
                    window.floorY     = box.min.y;

                    console.log('[ROOM] size:', size, 'center:', center, 'boxMinY:', box.min.y);

                    const raycaster = new THREE.Raycaster(
                        new THREE.Vector3(center.x, box.max.y + 1, center.z),
                        new THREE.Vector3(0, -1, 0)
                    );
                    const meshes = [];
                    room.traverse(n => { if (n.isMesh) meshes.push(n); });
                    const hits = raycaster.intersectObjects(meshes, false);
                    if (hits.length > 0) {
                        window.floorY = hits[0].point.y;
                        console.log('[ROOM] raycasted floorY:', window.floorY);
                    } else {
                        window.floorY = box.min.y;
                        console.log('[ROOM] fallback floorY:', window.floorY);
                    }
                    resolve();
                }, undefined, (err) => {
                    console.error('[ROOM] Yükleme hatası:', err);
                    window.floorY = -1.5;
                    window.roomCenter = new THREE.Vector3(0, 0, 0);
                    resolve();
                });
            });
        }

        function loadAvatar() {
            return new Promise((resolve) => {
                const loader = new GLTFLoader();
                loader.load('/' + character.model, (gltf) => {
                    loaderStatus.textContent = "AVATAR YÜKLENİYOR...";

                    avatar = gltf.scene;

                    // Toon gradient map (3 bant: gölge / orta / aydınlık)
                    const gradientData = new Uint8Array([40, 140, 255]);
                    const gradientTex = new THREE.DataTexture(gradientData, 3, 1, THREE.RedFormat);
                    gradientTex.needsUpdate = true;

                    // Toon shader uygula
                    avatar.traverse(n => {
                        if (!n.isMesh) return;
                        n.castShadow = true;
                        n.receiveShadow = true;

                        const origColor = n.material?.color
                            ? n.material.color.clone()
                            : new THREE.Color(0xc8a882);
                        const origMap = n.material?.map || null;

                        n.material = new THREE.MeshToonMaterial({
                            color: origColor,
                            map: origMap,
                            gradientMap: gradientTex,
                        });
                    });

                    // Ölç ve boyutlandır
                    avatar.position.set(0,0,0);
                    avatar.scale.set(1,1,1);
                    avatar.updateMatrixWorld(true);
                    const aBox  = new THREE.Box3().setFromObject(avatar);
                    const aSize = aBox.getSize(new THREE.Vector3());
                    const maxDim = Math.max(aSize.x, aSize.y, aSize.z);
                    const targetH = 1.55;
                    const sc = (targetH / maxDim) * character.scaleMult;
                    avatar.scale.set(sc, sc, sc);
                    avatar.updateMatrixWorld(true);

                    // Zemine oturtur — X=0, Z=0 world origin, sadece Y zemine snap
                    const newBox = new THREE.Box3().setFromObject(avatar);
                    const fy = window.floorY !== undefined ? window.floorY : -1.0;

                    const charH = (newBox.max.y - newBox.min.y);
                    // Odanın ortasına yerleştir
                    avatar.position.set(0, fy - newBox.min.y, 0);
                    avatar.updateMatrixWorld(true);

                    // Kameraya baksın (varsayılan yön: +Z)
                    avatar.rotation.y = 0;
                    avatar.userData.baseRotY = 0;

                    // Kamera: göğüs/baş hizasında, avatarın önünde
                    const camY  = fy + charH * 0.65;
                    const camZ  = charH * 2.2;
                    camera.position.set(0, camY, camZ);
                    cameraTarget.set(0, fy + charH * 0.55, 0);
                    camera.lookAt(cameraTarget);
                    window.defaultCam = { y: camY, z: camZ, tgtY: fy + charH * 0.55 };

                    console.log('[CHAR] pos:', avatar.position, 'charH:', charH, 'fy:', fy);
                    scene.add(avatar);

                    // Avatar spotlight'ı karaktere yönelt
                    if (window.avatarSpot) {
                        window.avatarSpot.position.set(avatar.position.x, fy + charH * 1.8, avatar.position.z + 2);
                        window.avatarSpot.target.position.set(avatar.position.x, fy + charH * 0.6, avatar.position.z);
                        window.avatarSpot.target.updateMatrixWorld();
                    }

                    // Mixer
                    mixer = new THREE.AnimationMixer(avatar);
                    animationsMap = {};
                    if (gltf.animations) {
                        gltf.animations.forEach(clip => {
                            const validTracks = clip.tracks.filter(t => !!avatar.getObjectByName(t.name.split('.')[0]));
                            if (validTracks.length > 0) {
                                const nc = new THREE.AnimationClip(clip.name, clip.duration, validTracks);
                                animationsMap[clip.name] = mixer.clipAction(nc);
                            }
                        });
                    }

                    // Extra animasyonları yükle
                    loaderStatus.textContent = "ANİMASYONLAR YÜKLENİYOR...";
                    const extraLoader = new GLTFLoader();
                    Promise.all(extraAnims.map(({ file, name }) =>
                        new Promise(res => {
                            extraLoader.load('/' + file, (a) => {
                                if (a.animations.length) {
                                    const clip = a.animations[0];
                                    const ft = clip.tracks.filter(t => !!avatar.getObjectByName(t.name.split('.')[0]));
                                    if (ft.length > 0) {
                                        const nc = new THREE.AnimationClip(name, clip.duration, ft);
                                        animationsMap[name] = mixer.clipAction(nc);
                                    }
                                }
                                res();
                            }, undefined, () => res());
                        })
                    )).then(() => {
                        resolve();
                    });

                }, undefined, (err) => {
                    console.error('[CHAR] Yükleme hatası:', err);
                    resolve();
                });
            });
        }

        function hideLoader() {
            loaderOverlay.style.opacity = '0';
            setTimeout(() => loaderOverlay.classList.add('hidden'), 1000);
        }

        function playAnimation(name, loop = false) {
            if (!mixer) return;

            // animMap çevirisi
            if (character.animMap && character.animMap[name]) name = character.animMap[name];

            let action = animationsMap[name];

            // Idle için fallback — mevcut animasyonlardan birini seç
            if (!action) {
                if (name === 'Idle' || name === 'idle') {
                    action = Object.values(animationsMap).find(a => a._clip.name.toLowerCase().includes('idle'))
                          || Object.values(animationsMap)[0];
                } else {
                    return; // bilinmeyen animasyon, yoksay
                }
            }

            if (!action || currentAction === action) return;

            const prev = currentAction;
            currentAction = action;

            if (loop) {
                currentAction.setLoop(THREE.LoopRepeat);
                currentAction.clampWhenFinished = false;
            } else {
                currentAction.setLoop(THREE.LoopOnce, 1);
                currentAction.clampWhenFinished = true;
                mixer.addEventListener('finished', restoreIdle);
            }

            currentAction.reset().play();
            if (prev) currentAction.crossFadeFrom(prev, 0.5, true);
        }

        function restoreIdle(e) {
            if (e.action === currentAction) {
                mixer.removeEventListener('finished', restoreIdle);
                playAnimation('Idle', true);
            }
        }

        function setCamera(mode, durationMs = 1800) {
            if (!avatar || !window.defaultCam) return;
            const d = window.defaultCam;
            const ax = avatar.position.x;
            const az = avatar.position.z;

            let toCam, toTgt;
            if (mode === 'close') {
                toCam = { x: ax, y: d.y + 0.15, z: az + 1.4 };
                toTgt = { x: ax, y: d.tgtY + 0.15, z: az };
            } else {
                toCam = { x: ax, y: d.y, z: d.z };
                toTgt = { x: ax, y: d.tgtY, z: az };
            }

            new TWEEN.Tween(camera.position).to(toCam, durationMs)
                .easing(TWEEN.Easing.Cubic.InOut).start();
            new TWEEN.Tween(cameraTarget).to(toTgt, durationMs)
                .easing(TWEEN.Easing.Cubic.InOut).start();
        }

        function setupPostProcessing() {
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloom = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.15, 0.5, 0.92
            );
            composer.addPass(bloom);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (typeof TWEEN !== 'undefined') TWEEN.update();
            const delta = clock.getDelta();
            const time  = clock.getElapsedTime();

            currentVolume += (targetVolume - currentVolume) * 0.15;
            if (mixer) mixer.update(delta);
            camera.lookAt(cameraTarget);

            if (avatar) {
                // D) Breathing — yavaş ritmik nefes hareketi
                const breathe = Math.sin(time * 1.1) * 0.008 + Math.sin(time * 2.3) * 0.003;
                if (avatar.userData.baseY === undefined) avatar.userData.baseY = avatar.position.y;
                avatar.position.y = avatar.userData.baseY + breathe;

                // Hafif doğal sallantı
                avatar.rotation.y = avatar.userData.baseRotY + Math.sin(time * 0.35) * 0.03;

                // A) Lip sync: morph target varsa kullan, yoksa head nod ile simüle et
                let hasMorph = false;
                avatar.traverse(node => {
                    if (node.isMesh && node.morphTargetInfluences && node.morphTargetDictionary) {
                        const d = node.morphTargetDictionary;
                        const mIdx = d['MouthOpen'] ?? d['viseme_aa'] ?? d['Surprised'];
                        if (mIdx !== undefined) { node.morphTargetInfluences[mIdx] = currentVolume * 3.5; hasMorph = true; }
                        const bIdx = d['EyeBlink'] ?? d['Blink'];
                        if (bIdx !== undefined) {
                            node.morphTargetInfluences[bIdx] = (time > blinkTime && time < blinkTime + 0.1) ? 1 : 0;
                            if (time >= blinkTime + 0.1) blinkTime = time + 2.5 + Math.random() * 3.5;
                        }
                    }
                });
                // Morph target yoksa: konuşurken hafif baş hareketi
                if (!hasMorph && currentVolume > 0.05) {
                    avatar.rotation.x = Math.sin(time * 8) * currentVolume * 0.04;
                } else {
                    avatar.rotation.x *= 0.9; // sıfıra dön
                }

                // C) Avatar spotlight — konuşunca parlaklık artar
                if (window.avatarSpot) {
                    const targetIntensity = 1.2 + currentVolume * 2.0;
                    window.avatarSpot.intensity += (targetIntensity - window.avatarSpot.intensity) * 0.08;
                }
            }

            // Kamera organik sallantı
            camera.position.y += Math.sin(time * 0.6) * 0.0003;
            camera.position.x += Math.cos(time * 0.4) * 0.0003;

            // Ateş titremesi
            if (window.fireLight) {
                window.fireLight.intensity = 1.5 + Math.sin(time * 9) * 0.4 + Math.random() * 0.15;
            }

            composer ? composer.render() : renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const pl = document.getElementById('panel-lyra');
            const w = pl ? pl.clientWidth  : window.innerWidth / 2;
            const h = pl ? pl.clientHeight : window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            if (composer) composer.setSize(w, h);
        });

        // ── VAPI EVENTS ──
        talkBtn.addEventListener('click', async () => {
            if (isCallActive) { vapiInstance.stop(); return; }

            // Backend'e token ile aktif kullanıcıyı bildir
            await fetch('/session-start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: supabaseToken })
            });

            vapiInstance.start(VAPI_ASSISTANT_ID, {
                variableValues: { userId: persistentUserId }
            });
        });

        // Glow panel referansları
        const panelLyraEl = document.getElementById('panel-lyra');
        const panelUserEl = document.getElementById('panel-user');

        vapiInstance.on('call-start', () => {
            isCallActive = true;
            fullConversation = "";
            lastUserMessage = '';
            silenceDuration = 0;
            silenceStartTime = null;
            statusEl.textContent = "GÖRÜŞME AKTİF";
            statusEl.classList.add('listening');
            talkBtn.textContent = "BAĞLANTIYI KES";
            talkBtn.classList.add('active');
            document.getElementById('mic-indicator').classList.add('active');
            setCamera('close', 1800);

            // Transcript streaming — her 5sn'de sunucuya gönder
            transcriptStreamInterval = setInterval(() => {
                if (!persistentUserId || !isCallActive) return;
                // Tempo trendi hesapla
                let tempoTrend = 'stabil';
                if (tempoGecmisi.length >= 3) {
                    const fark = tempoGecmisi[tempoGecmisi.length-1] - tempoGecmisi[0];
                    if (fark > 0.5) tempoTrend = 'artıyor';
                    else if (fark < -0.5) tempoTrend = 'azalıyor';
                }
                fetch('/update-transcript', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: persistentUserId,
                        fullTranscript: fullConversation,
                        silenceDuration: Math.round(silenceDuration),
                        lastSegment: lastUserMessage,
                        sesYogunlukOrt: Math.round(sesYogunlukOrt * 100) / 100,
                        sesTitreme,
                        konusmaTempo: Math.round(konusmaTempo * 10) / 10,
                        tempoTrend
                    })
                }).catch(() => {});
            }, 5000);
        });

        vapiInstance.on('speech-start', () => {
            if (panelLyraEl) panelLyraEl.classList.add('speaking');
            if (panelUserEl) panelUserEl.classList.remove('speaking');
        });

        vapiInstance.on('speech-end', () => {
            if (panelLyraEl) panelLyraEl.classList.remove('speaking');
        });

        vapiInstance.on('call-end', async () => {
            isCallActive = false;
            statusEl.textContent = "SİSTEM HAZIR";
            statusEl.classList.remove('listening');
            talkBtn.textContent = "GÖRÜŞMEYİ BAŞLAT";
            talkBtn.classList.remove('active');
            document.getElementById('mic-indicator').classList.remove('active');
            targetVolume = 0;
            if (panelLyraEl) panelLyraEl.classList.remove('speaking');
            if (panelUserEl) panelUserEl.classList.remove('speaking');
            setCamera('normal', 2000);
            clearInterval(transcriptStreamInterval);
            transcriptStreamInterval = null;
            silenceStartTime = null;
            silenceDuration = 0;
            lastUserMessage = '';
            sesGecmisi = [];
            sesYogunlukOrt = 0;
            sesTitreme = false;
            konusmaBaslangic = null;
            konusmaKelimeSayisi = 0;
            konusmaTempo = 0;
            tempoGecmisi = [];

            console.log('[MEMORY] call-end fired. userId:', persistentUserId, 'transcript length:', fullConversation.length);
            console.log('[MEMORY] transcript preview:', fullConversation.substring(0, 200));

            if (fullConversation.length > 50) {
                try {
                    const res = await fetch('/save-local-memory', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ userId: persistentUserId, transcript: fullConversation })
                    });
                    console.log('[MEMORY] save response:', res.status);
                } catch(e) { console.error("Memory save failed:", e); }
            } else {
                console.warn('[MEMORY] Transcript too short, not saving.');
            }
        });

        vapiInstance.on('volume-level', vol => {
            targetVolume = vol;

            // Ses pattern takibi
            sesGecmisi.push(vol);
            if (sesGecmisi.length > 20) sesGecmisi.shift();
            if (sesGecmisi.length >= 5) {
                sesYogunlukOrt = sesGecmisi.reduce((a, b) => a + b, 0) / sesGecmisi.length;
                const ort = sesYogunlukOrt;
                const stdDev = Math.sqrt(sesGecmisi.reduce((s, v) => s + Math.pow(v - ort, 2), 0) / sesGecmisi.length);
                sesTitreme = stdDev > 0.08 && ort > 0.05; // Konuşurken titreme
            }

            if (panelUserEl) {
                if (vol > 0.05) {
                    panelUserEl.classList.add('speaking');
                    silenceStartTime = null;
                    silenceDuration = 0;
                } else {
                    panelUserEl.classList.remove('speaking');
                    if (!silenceStartTime) silenceStartTime = Date.now();
                    silenceDuration = (Date.now() - silenceStartTime) / 1000;
                }
            }
        });

        vapiInstance.on('message', (message) => {
            // Vapi'nin end-of-call-report mesajından transcript al
            if (message?.type === 'end-of-call-report' && message.transcript) {
                console.log('[MEMORY] end-of-call-report alındı, transcript uzunluğu:', message.transcript.length);
                if (message.transcript.length > 50 && persistentUserId) {
                    fetch('/save-local-memory', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: persistentUserId, transcript: message.transcript })
                    }).then(r => console.log('[MEMORY] Kaydedildi:', r.status))
                      .catch(e => console.error('[MEMORY] Hata:', e));
                }
            }

            if (message?.type === 'transcript' && message.transcriptType === 'final') {
                const text = message.transcript.toLowerCase();
                fullConversation += (message.role || 'user') + ': ' + message.transcript + '\n';
                if (message.role === 'user') {
                    lastUserMessage = message.transcript;
                    // Konuşma temposu hesapla
                    const kelimeler = message.transcript.trim().split(/\s+/).length;
                    if (!konusmaBaslangic) konusmaBaslangic = Date.now();
                    konusmaKelimeSayisi += kelimeler;
                    const sure = (Date.now() - konusmaBaslangic) / 1000;
                    if (sure > 0) {
                        const yeniTempo = konusmaKelimeSayisi / sure;
                        tempoGecmisi.push(yeniTempo);
                        if (tempoGecmisi.length > 5) tempoGecmisi.shift();
                        konusmaTempo = yeniTempo;
                    }
                }
                transcriptEl.style.opacity = '0';
                setTimeout(() => {
                    transcriptEl.textContent = `"${message.transcript}"`;
                    transcriptEl.style.opacity = '1';
                }, 150);

                if      (text.includes('mutlu') || text.includes('harika')) emotionState = 'neutral';
                else if (text.includes('üzgün') || text.includes('kötü'))   emotionState = 'sad';
                else if (text.includes('sinirli'))                           emotionState = 'angry';

                if      (text.includes('evet') || text.includes('kesinlikle') || text.includes('tabii'))
                                                                              playAnimation('Yes');
                else if (text.includes('hayır') || text.includes('değil'))   playAnimation('No');
                else if (text.includes('merhaba') || text.includes('selam') || text.includes('hoş geldin'))
                                                                              playAnimation('Wave');
                else if (text.includes('dans'))                               playAnimation('Dance');
                else if (text.includes('şaşır') || text.includes('inanılmaz') || text.includes('gerçekten mi'))
                                                                              playAnimation('Surprise');
                else if (text.includes('üzgün') || text.includes('zor') || text.includes('endişe'))
                                                                              playAnimation('Sad');
                else if (text.includes('sinirli') || text.includes('kızgın')) playAnimation('Angry');
                else                                                           playAnimation('Talk');
            }
        });

        vapiInstance.on('error', (err) => {
            console.error('[VAPI] Hata:', err);
            isCallActive = false;
            talkBtn.textContent = "GÖRÜŞMEYİ BAŞLAT";
            talkBtn.classList.remove('active');
            document.getElementById('mic-indicator').classList.remove('active');
            statusEl.classList.remove('listening');
            statusEl.textContent = "SİSTEM HAZIR";
            showError("Bağlantı hatası oluştu. Lütfen tekrar deneyin.");
        });

    </script>
</body>
</html>
