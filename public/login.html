<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyra — Akıllı Giriş</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0806;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ── CANVAS BG ── */
        #login-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

        /* ── PREMİUM CARD SHELL ── */
        .login-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 0 20px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(200, 169, 110, 0.08), rgba(200, 169, 110, 0.02));
            border-radius: 28px;
            border: 1px solid rgba(200, 169, 110, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            animation: shellEnter 0.9s cubic-bezier(0.32, 0.72, 0, 1) both;
        }
        @keyframes shellEnter {
            0% { opacity: 0; transform: translateY(24px) scale(0.92); filter: blur(12px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .login-card {
            background: rgba(14, 10, 6, 0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: calc(28px - 2px);
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── ANİMASYONLU KARAKTER (SVG AVATAR) ── */
        .avatar-container {
            width: 120px;
            height: 120px;
            position: relative;
            margin-bottom: 24px;
            perspective: 500px;
        }
        .avatar-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
        .avatar-face {
            fill: #c8a96e;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .avatar-eye { fill: #0a0806; transition: all 0.1s; }
        .avatar-pupil { fill: #fff; transition: all 0.1s; }
        
        /* Eller - Şifre gizlendiğinde gözü kapatır */
        .avatar-arm {
            fill: #e8c99a;
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .arm-left { transform: translate(-20px, 40px) rotate(-20deg) scaleY(0); }
        .arm-right { transform: translate(20px, 40px) rotate(20deg) scaleY(0); }

        .blindfold .arm-left { transform: translate(-20px, -15px) rotate(15deg) scaleY(1); }
        .blindfold .arm-right { transform: translate(20px, -15px) rotate(-15deg) scaleY(1); }
        .blindfold .avatar-eye { transform: scaleY(0.1); } /* Gözlerini kısar */

        /* ── HEADER ── */
        .login-logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #c8a96e;
            text-transform: uppercase;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #c8a96e 0%, #e8c99a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── GİRDİ ALANLARI ── */
        .login-field {
            width: 100%;
            position: relative;
            margin-bottom: 16px;
        }
        .login-label {
            position: absolute;
            top: -8px; left: 14px;
            background: rgba(14, 10, 6, 0.96);
            padding: 0 6px;
            font-size: 10px;
            color: rgba(200, 169, 110, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
        }
        .login-input {
            width: 100%;
            background: rgba(200, 169, 110, 0.04);
            border: 1.5px solid rgba(200, 169, 110, 0.14);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        .login-input:focus {
            border-color: rgba(200, 169, 110, 0.4);
            background: rgba(200, 169, 110, 0.08);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.1);
        }
        .pwd-toggle {
            position: absolute; right: 12px; top: 12px;
            background: none; border: none; cursor: pointer; color: rgba(200, 169, 110, 0.5);
        }

        /* ── ŞİFRE GÜVENLİĞİ ── */
        .pwd-strength-wrap { width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .pwd-strength-bar { flex: 1; height: 4px; background: rgba(200,169,110,0.1); border-radius: 2px; overflow: hidden; }
        .pwd-strength-fill { height: 100%; width: 0%; background: #d47777; transition: 0.3s; }
        .pwd-criteria { width: 100%; list-style: none; display: flex; flex-wrap: wrap; gap: 6px 12px; margin-bottom: 16px; }
        .pwd-criteria li { font-size: 10px; color: rgba(200, 169, 110, 0.4); display: flex; align-items: center; gap: 4px; }
        .pwd-criteria li::before { content: '○'; }
        .pwd-criteria li.met { color: #70c896; }
        .pwd-criteria li.met::before { content: '●'; }

        /* ── BUTONLAR ── */
        .login-btn, .action-btn {
            width: 100%; padding: 14px;
            border: none; border-radius: 12px;
            font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: 0.3s;
        }
        .login-btn {
            background: linear-gradient(135deg, #c8a96e 0%, #e8c99a 100%);
            color: #0a0806; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(200, 169, 110, 0.2); }
        .login-btn:active { transform: translateY(0); }
        
        .action-btn {
            background: transparent; border: 1px solid rgba(200, 169, 110, 0.2);
            color: #c8a96e; margin-bottom: 16px;
        }
        .action-btn:hover { background: rgba(200, 169, 110, 0.05); }

        .text-link { color: rgba(200, 169, 110, 0.6); font-size: 12px; text-decoration: none; cursor: pointer; transition: 0.2s; }
        .text-link:hover { color: #c8a96e; }

        /* ── SOSYAL BUTONLAR ── */
        .social-divider { display: flex; align-items: center; width: 100%; gap: 12px; margin: 24px 0 16px; color: rgba(200, 169, 110, 0.3); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
        .social-divider::before, .social-divider::after { content: ''; flex: 1; height: 1px; background: rgba(200, 169, 110, 0.1); }
        .social-wrap { display: flex; gap: 12px; width: 100%; justify-content: center; margin-bottom: 12px; }
        .social-btn {
            width: 48px; height: 48px; border-radius: 12px; border: 1px solid rgba(200, 169, 110, 0.15);
            background: rgba(200, 169, 110, 0.02); display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s;
        }
        .social-btn:hover { background: rgba(200, 169, 110, 0.08); transform: translateY(-2px); }
        .social-btn svg { width: 22px; height: 22px; fill: #c8a96e; }

        /* ── ADIM YÖNETİMİ ── */
        .step { display: none; width: 100%; flex-direction: column; align-items: center; }
        .step.active { display: flex; animation: fadeUp 0.4s ease forwards; }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .login-error { color: #d47777; font-size: 12px; margin-bottom: 12px; height: 15px; }
    </style>
</head>
<body>
    <canvas id="login-canvas"></canvas>

    <div class="login-shell">
        <div class="login-card">
            <div class="login-logo-text">LYRA</div>

            <!-- ANİMASYONLU KARAKTER -->
            <div class="avatar-container" id="avatar">
                <svg class="avatar-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Kafa -->
                    <rect x="20" y="20" width="60" height="60" rx="20" class="avatar-face" />
                    <!-- Gözler -->
                    <g id="eyesGroup">
                        <circle cx="35" cy="45" r="8" class="avatar-eye" />
                        <circle cx="35" cy="45" r="3" class="avatar-pupil" id="pupilL" />
                        <circle cx="65" cy="45" r="8" class="avatar-eye" />
                        <circle cx="65" cy="45" r="3" class="avatar-pupil" id="pupilR" />
                    </g>
                    <!-- Ağız -->
                    <path d="M 40 65 Q 50 75 60 65" stroke="#0a0806" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <!-- Eller -->
                    <rect x="25" y="60" width="18" height="30" rx="9" class="avatar-arm arm-left" />
                    <rect x="57" y="60" width="18" height="30" rx="9" class="avatar-arm arm-right" />
                </svg>
            </div>

            <!-- ADIM 1: KİMLİK (E-POSTA / TELEFON) -->
            <div class="step active" id="step-identity">
                <div class="login-field">
                    <input class="login-input" type="text" id="inp-identity" placeholder="E-posta veya 555xxxxxxx" autocomplete="username">
                    <label class="login-label">E-Posta / Telefon</label>
                </div>
                <div class="login-error" id="err-identity"></div>
                <button class="login-btn" id="btn-next">Devam Et</button>
                
                <div class="social-divider">Bağlan</div>
                <div class="social-wrap">
                    <button class="social-btn" onclick="alert('Google entegrasyonu yakında!')">
                        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    </button>
                    <button class="social-btn" onclick="alert('Apple entegrasyonu yakında!')">
                        <svg viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    </button>
                    <button class="social-btn" onclick="alert('Facebook entegrasyonu yakında!')">
                        <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    </button>
                </div>
            </div>

            <!-- ADIM 2: GİRİŞ YAP -->
            <div class="step" id="step-login">
                <div class="login-field">
                    <input class="login-input pwd-input" type="password" id="inp-login-pwd" placeholder="••••••••">
                    <label class="login-label">Şifre</label>
                    <button class="pwd-toggle" onclick="togglePwd('inp-login-pwd')">👁</button>
                </div>
                <div class="login-error" id="err-login"></div>
                <button class="login-btn" id="btn-login-submit">Giriş Yap</button>
                <div style="width:100%; display:flex; justify-content: space-between;">
                    <a class="text-link" onclick="goTo('step-forgot')">Şifremi Unuttum</a>
                    <a class="text-link" onclick="goTo('step-identity')">← Geri</a>
                </div>
            </div>

            <!-- ADIM 3: KAYIT OL -->
            <div class="step" id="step-register">
                <div class="login-field">
                    <input class="login-input" type="text" id="inp-reg-name" placeholder="Ad Soyad">
                    <label class="login-label">Ad Soyad</label>
                </div>
                <div class="login-field">
                    <input class="login-input pwd-input" type="password" id="inp-reg-pwd" placeholder="Şifre (Min 8 Karakter)">
                    <label class="login-label">Yeni Şifre</label>
                    <button class="pwd-toggle" onclick="togglePwd('inp-reg-pwd')">👁</button>
                </div>
                
                <div class="pwd-strength-wrap">
                    <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwd-fill"></div></div>
                </div>
                <ul class="pwd-criteria">
                    <li id="c-len">8+ Karakter</li>
                    <li id="c-upper">Büyük Harf</li>
                    <li id="c-num">Rakam</li>
                    <li id="c-sym">Özel Karakter (!@#$)</li>
                </ul>
                <button class="action-btn" id="btn-suggest-pwd">✨ Güçlü Şifre Öner</button>

                <div class="login-error" id="err-register"></div>
                <button class="login-btn" id="btn-register-submit">Hesap Oluştur</button>
                <a class="text-link" onclick="goTo('step-identity')">← Geri Dön</a>
            </div>

            <!-- ADIM 4: ŞİFRE SIFIRLAMA -->
            <div class="step" id="step-forgot">
                <p style="color:rgba(200,169,110,0.6); font-size:12px; margin-bottom:16px; text-align:center;">Şifre sıfırlama bağlantısı gönderilecektir.</p>
                <div class="login-field">
                    <input class="login-input" type="text" id="inp-forgot-identity" placeholder="E-posta veya Telefon" disabled>
                    <label class="login-label">Kurtarma Hedefi</label>
                </div>
                <div class="login-error" id="err-forgot"></div>
                <button class="login-btn" id="btn-forgot-submit">Bağlantı Gönder</button>
                <a class="text-link" onclick="goTo('step-identity')">← Geri Dön</a>
            </div>

        </div>
    </div>

    <script>
        /* ── AVATAR ANİMASYON MANTIĞI (Rive/Lottie Benzeri) ── */
        const avatar = document.getElementById('avatar');
        const pupilL = document.getElementById('pupilL');
        const pupilR = document.getElementById('pupilR');
        const allInputs = document.querySelectorAll('.login-input');
        
        let isBlindfolded = false;

        // Gözlerin klavye yazısını takip etmesi
        document.addEventListener('input', (e) => {
            if (isBlindfolded) return;
            const target = e.target;
            if (target.type === 'text' || target.type === 'email') {
                const len = Math.min(target.value.length, 30);
                const xOffset = (len / 30) * 10 - 5; // -5 to +5 range
                pupilL.setAttribute('cx', 35 + xOffset);
                pupilR.setAttribute('cx', 65 + xOffset);
            }
        });

        // Şifre alanına odaklanınca eller gözü kapatır
        allInputs.forEach(input => {
            input.addEventListener('focus', () => {
                if (input.classList.contains('pwd-input') && input.type === 'password') {
                    avatar.classList.add('blindfold');
                    isBlindfolded = true;
                } else {
                    avatar.classList.remove('blindfold');
                    isBlindfolded = false;
                    pupilL.setAttribute('cx', 35);
                    pupilR.setAttribute('cx', 65);
                }
            });
            input.addEventListener('blur', () => {
                avatar.classList.remove('blindfold');
                isBlindfolded = false;
            });
        });

        function togglePwd(id) {
            const el = document.getElementById(id);
            if (el.type === 'password') {
                el.type = 'text';
                avatar.classList.remove('blindfold'); // Gözü aç
            } else {
                el.type = 'password';
                avatar.classList.add('blindfold'); // Gözü kapat
            }
            el.focus();
        }

        /* ── ŞİFRE GÜCÜ KONTROLÜ ── */
        const regPwd = document.getElementById('inp-reg-pwd');
        regPwd.addEventListener('input', (e) => checkStrength(e.target.value));

        function checkStrength(pwd) {
            const flags = {
                len: pwd.length >= 8,
                upper: /[A-Z]/.test(pwd),
                num: /[0-9]/.test(pwd),
                sym: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd)
            };
            
            let score = 0;
            for (let id in flags) {
                document.getElementById('c-' + id).classList.toggle('met', flags[id]);
                if (flags[id]) score++;
            }

            const fill = document.getElementById('pwd-fill');
            const colors = ['#d47777', '#e8a85c', '#e8c96a', '#70c896'];
            fill.style.width = (score * 25) + '%';
            fill.style.background = score > 0 ? colors[score - 1] : '#d47777';
            return score === 4;
        }

        document.getElementById('btn-suggest-pwd').addEventListener('click', () => {
            const chars = "abcdefghjkmnpqrstuvwxyzABCDEFGHJKMNPQRSTUVWXYZ23456789!@#$%";
            let pwd = Array.from({length: 12}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            // Ensure criteria met
            pwd += "A1!"; 
            regPwd.value = pwd;
            checkStrength(pwd);
            regPwd.type = 'text'; // Show the suggested password
            avatar.classList.remove('blindfold');
        });

        /* ── ADIM GEÇİŞLERİ VE LOGIC ── */
        function goTo(stepId) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        let isLogin = true; // Flow context
        let currentIdentity = "";

        document.getElementById('btn-next').addEventListener('click', async () => {
            const ident = document.getElementById('inp-identity').value.trim();
            if(!ident) return document.getElementById('err-identity').innerText = "E-posta veya telefon gerekli.";
            document.getElementById('err-identity').innerText = "";
            currentIdentity = ident;

            const isEmail = ident.includes('@');
            // Mock backend check request 
            const reqData = isEmail ? { email: ident } : { phone: ident };
            
            try {
                // Sadece mevcut API'ne saygı duyuyoruz (check-email gibi bir şey vardı, biz bunu genelledik)
                const res = await fetch('/auth/check-email', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: isEmail ? ident : `${ident}@phone.lyra` }) // Geçiçi mock
                });
                const { exists } = await res.json();
                
                if (exists) {
                    goTo('step-login');
                } else {
                    goTo('step-register');
                }
            } catch (err) {
                // API fail fallback for demo:
                goTo(ident.includes('yeni') ? 'step-register' : 'step-login');
            }
        });

        document.getElementById('btn-login-submit').addEventListener('click', async () => {
            const pwd = document.getElementById('inp-login-pwd').value;
            if(!pwd) return document.getElementById('err-login').innerText = "Şifre zorunlu";
            
            // Backend call...
            try {
                const isEmail = currentIdentity.includes('@');
                const response = await fetch('/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: isEmail ? currentIdentity : `${currentIdentity}@phone.lyra`, password: pwd })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('user_id', data.userId);
                    window.location.href = '/';
                } else {
                    document.getElementById('err-login').innerText = data.error || "Giriş başarısız";
                }
            } catch(err) {
                document.getElementById('err-login').innerText = "Bağlantı hatası";
            }
        });

        document.getElementById('btn-register-submit').addEventListener('click', async () => {
            const name = document.getElementById('inp-reg-name').value;
            const pwd = document.getElementById('inp-reg-pwd').value;
            if(!name) return document.getElementById('err-register').innerText = "Ad soyad gerekli";
            if(!checkStrength(pwd)) return document.getElementById('err-register').innerText = "Şifre yeterince güçlü değil";
            
            try {
                const isEmail = currentIdentity.includes('@');
                const response = await fetch('/auth/signup', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: isEmail ? currentIdentity : `${currentIdentity}@phone.lyra`, password: pwd, fullName: name })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('user_id', data.userId);
                    window.location.href = '/';
                } else {
                    document.getElementById('err-register').innerText = data.error || "Kayıt başarısız";
                }
            } catch(err) {
                document.getElementById('err-register').innerText = "Bağlantı hatası";
            }
        });

        // Background WebGL Logic (Korundu)
        (function initSmokey() {
            const canvas = document.getElementById('login-canvas');
            const gl = canvas.getContext('webgl');
            if (!gl) return;
            const vs = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vs, `attribute vec4 p; void main(){ gl_Position=p; }`);
            gl.compileShader(vs);
            const fs = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fs, `precision mediump float;
            uniform vec2 iRes; uniform float iTime; uniform vec2 iMouse;
            void main(){
              vec2 c = (2.0*gl_FragCoord.xy - iRes) / min(iRes.x,iRes.y);
              float t = iTime*0.03; vec2 m = iMouse/iRes*2.0-1.0; m *= 0.4; vec2 d = c;
              for(float i=1.0;i<7.0;i++){ d.x+=0.4/i*cos(i*2.0*d.y+t+m.x*3.14); d.y+=0.4/i*cos(i*2.0*d.x+t+m.y*3.14); }
              float w = abs(sin(d.x+d.y+t)); float g = smoothstep(0.85,0.15,w);
