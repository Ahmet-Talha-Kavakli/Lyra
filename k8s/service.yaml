# Main Application Service (ClusterIP + LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: lyra-service
  namespace: lyra
  labels:
    app: lyra
spec:
  type: LoadBalancer
  selector:
    app: lyra
    component: main-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: http
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
---
# Internal Service (ClusterIP only)
apiVersion: v1
kind: Service
metadata:
  name: lyra-internal
  namespace: lyra
  labels:
    app: lyra
spec:
  type: ClusterIP
  selector:
    app: lyra
    component: main-app
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: lyra
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# StatefulSet for Redis (persistent state)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: lyra
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
