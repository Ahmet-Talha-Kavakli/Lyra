# Kubernetes Ingress for production
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lyra-ingress
  namespace: lyra
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "20"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - lyra.example.com
        - api.lyra.example.com
      secretName: lyra-tls-cert
  rules:
    - host: lyra.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lyra-service
                port:
                  number: 80
    - host: api.lyra.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lyra-service
                port:
                  number: 80
