version: '3.9'

services:
  # Main Lyra Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lyra-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./lib:/app/lib
      - ./routes:/app/routes
      - ./middleware:/app/middleware
      - ./src:/app/src
    networks:
      - lyra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis for Caching & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: lyra-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - lyra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database (Optional - if not using Supabase)
  postgres:
    image: postgres:16-alpine
    container_name: lyra-postgres
    environment:
      POSTGRES_DB: lyra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lyra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  lyra-network:
    driver: bridge
