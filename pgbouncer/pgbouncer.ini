[databases]
# Database connection strings
lyra = host=postgres port=5432 dbname=lyra user=postgres password=postgres

[pgbouncer]
# Connection pooling mode: session/transaction/statement
pool_mode = transaction

# Number of connections PgBouncer keeps to PostgreSQL
max_db_connections = 100

# Default number of connection slots per database
default_pool_size = 25

# Minimum connections to keep idle
min_pool_size = 5

# Connections idle longer than this will be closed
idle_in_transaction_session_timeout = 30000

# Connection timeout to PostgreSQL
connect_timeout = 10

# Timeout for client connections
client_idle_timeout = 300

# Server idle timeout
server_idle_timeout = 600

# Server lifetime
server_lifetime = 3600

# Max DB connections
max_client_conn = 1000

# Logfile
logfile = /var/log/pgbouncer/pgbouncer.log

# Pidfile
pidfile = /var/run/pgbouncer/pgbouncer.pid

# Listening address
listen_addr = 0.0.0.0

# Listening port
listen_port = 6432

# Admin console address
admin_bind_addr = 127.0.0.1

# Administrative queries
admin_users = postgres

# Statistics
stats_users = postgres

# Verbosity: debug/info/warning/error
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Verbose logging
verbose = 0

# Query logging
query_wait_timeout = 120

# Connection check query
server_check_query = select 1

# Server check delay
server_check_delay = 30

# Enable/disable SCRAM authentication
scram_username = postgres
scram_password = postgres

# Auth file (user credentials)
auth_file = /etc/pgbouncer/userlist.txt
auth_type = md5

# Statement cache size
statement_cache_size = 100

# Prepared statements
prepared_statement_cache_size = 100

# Enable/disable prepared statements
prepared_statement_name_func = concat('stmt_', to_hex(hash_md5(statement)))
